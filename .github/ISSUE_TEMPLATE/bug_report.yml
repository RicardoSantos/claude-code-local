name: Bug Report
description: Something not working as expected
labels: ["bug"]
body:
  - type: dropdown
    id: model
    attributes:
      label: Which model?
      options:
        - Gemma 4 31B
        - Llama 3.3 70B
        - Qwen 3.5 122B
    validations:
      required: true
  - type: input
    id: hardware
    attributes:
      label: Mac model + RAM
      placeholder: "e.g. M4 Max 128GB"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell
